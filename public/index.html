<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily Fitness Tracker</title>
    <meta
      name="description"
      content="Log daily calories, protein, and steps. Track weekly and monthly progress against your goals."
    />
    <meta name="theme-color" content="#0f1419" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Daily Fitness Tracker" />
    <meta
      property="og:description"
      content="Log daily calories, protein, and steps. Track weekly and monthly progress against your goals."
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --bg: #0f1419;
        --surface: #1a2332;
        --surface-2: #243044;
        --text: #e8edf4;
        --muted: #8b9cb3;
        --accent: #3dd68c;
        --accent-dim: #2a9d63;
        --danger: #f07178;
        --warning: #e6b450;
        --border: #2e3d52;
        --radius: 10px;
      }

      * { box-sizing: border-box; }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
        line-height: 1.5;
      }

      .wrap {
        max-width: 1000px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      header { margin-bottom: 24px; }
      h1 { margin: 0 0 6px; font-size: 1.75rem; }
      .subtitle { color: var(--muted); margin: 0; }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 20px;
      }

      .card h2 {
        margin: 0 0 14px;
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      label {
        display: block;
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input, textarea, button, select {
        font: inherit;
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      input, textarea, select {
        width: 100%;
        padding: 10px 12px;
        background: var(--surface-2);
        color: var(--text);
        margin-bottom: 12px;
      }

      input:focus, textarea:focus, select:focus {
        outline: 2px solid var(--accent-dim);
        outline-offset: 1px;
      }

      textarea.json-input {
        min-height: 220px;
        font-family: "Cascadia Code", "Consolas", monospace;
        font-size: 13px;
        resize: vertical;
      }

      .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      @media (max-width: 520px) {
        .field-row { grid-template-columns: 1fr; }
      }

      button {
        cursor: pointer;
        padding: 10px 18px;
        font-weight: 600;
        border: none;
      }

      .btn-primary { background: var(--accent); color: #0a120e; }
      .btn-secondary {
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
      }

      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }

      .hint {
        font-size: 0.8rem;
        color: var(--muted);
        margin: 0 0 12px;
      }

      .status {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.9rem;
        margin-bottom: 16px;
        display: none;
      }

      .status.visible { display: block; }
      .status.success { background: rgba(61, 214, 140, 0.12); border: 1px solid var(--accent-dim); color: var(--accent); }
      .status.error { background: rgba(240, 113, 120, 0.12); border: 1px solid #c4555c; color: var(--danger); }
      .status.info { background: rgba(139, 156, 179, 0.1); border: 1px solid var(--border); color: var(--muted); }

      .range-label {
        color: var(--muted);
        font-size: 0.85rem;
        margin: 0 0 14px;
      }

      .comparison-banner {
        display: none;
        flex-direction: column;
        gap: 6px;
        padding: 10px 12px;
        margin-bottom: 14px;
        border-radius: 8px;
        background: rgba(139, 156, 179, 0.08);
        border: 1px solid var(--border);
        font-size: 0.85rem;
      }

      .comparison-banner.visible { display: flex; }
      .comparison-title { color: var(--muted); font-weight: 600; }

      .change {
        display: inline-block;
        margin-left: 6px;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
        white-space: nowrap;
      }

      .change.up { background: rgba(61, 214, 140, 0.15); color: var(--accent); }
      .change.down { background: rgba(240, 113, 120, 0.12); color: var(--danger); }
      .change.flat { background: rgba(139, 156, 179, 0.12); color: var(--muted); }

      .progress-header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .score-badge {
        background: var(--surface-2);
        border: 1px solid var(--border);
        padding: 8px 14px;
        border-radius: 999px;
        font-weight: 700;
        font-size: 0.9rem;
      }

      .score-badge.complete {
        background: rgba(61, 214, 140, 0.15);
        border-color: var(--accent-dim);
        color: var(--accent);
      }

      #streakStats {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 14px;
      }

      .metric { margin-bottom: 14px; }
      .metric-head {
        display: flex;
        justify-content: space-between;
        font-size: 0.9rem;
        margin-bottom: 6px;
        gap: 12px;
      }

      .metric-head span:last-child { text-align: right; max-width: 62%; }
      .met-text { color: var(--accent); font-weight: 600; }

      .bar {
        height: 8px;
        background: var(--surface-2);
        border-radius: 999px;
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        background: var(--warning);
        border-radius: 999px;
        transition: width 0.3s ease;
      }

      .bar-fill.met { background: var(--accent); }

      .message {
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 0.9rem;
      }

      .message.success { background: rgba(61, 214, 140, 0.1); color: var(--accent); }
      .message.info { background: rgba(139, 156, 179, 0.08); color: var(--muted); }

      #weeklyStats {
        color: var(--muted);
        font-size: 0.85rem;
        margin-top: 12px;
      }

      .table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      table.history-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }

      .history-table th,
      .history-table td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }

      .history-table th {
        color: var(--muted);
        font-size: 0.75rem;
        text-transform: uppercase;
      }

      .history-table .col-net {
        text-align: right;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .diet-more-btn {
        display: none;
        margin-top: 6px;
        padding: 4px 10px;
        font-size: 0.72rem;
        font-weight: 600;
        background: var(--surface-2);
        color: var(--accent);
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
      }

      .diet-more-btn:hover { border-color: var(--accent-dim); }

      @media (max-width: 640px) {
        .history-table {
          table-layout: fixed;
          font-size: 0.78rem;
        }

        .history-table th,
        .history-table td {
          padding: 8px 5px;
        }

        .history-table .col-date { width: 24%; }
        .history-table .col-diet { width: 28%; }
        .history-table .col-intake { width: 14%; }
        .history-table .col-protein { width: 14%; }
        .history-table .col-steps { width: 12%; }
        .history-table .col-net {
          width: 8%;
          min-width: 2.75rem;
          padding-right: 4px;
        }

        .history-table .col-steps {
          white-space: nowrap;
          font-size: 0.72rem;
        }

        .diet-cell.diet-truncated .diet-text {
          display: -webkit-box;
          -webkit-line-clamp: 2;
          -webkit-box-orient: vertical;
          overflow: hidden;
          word-break: break-word;
        }

        .diet-cell.diet-truncated .diet-more-btn { display: inline-block; }

        tr.diet-expanded .diet-cell .diet-text {
          display: block;
          -webkit-line-clamp: unset;
          overflow: visible;
        }
      }

      .net-positive { color: var(--warning); }
      .net-negative { color: var(--accent); }
      .empty { color: var(--muted); text-align: center; padding: 24px; }

      .pagination {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 16px;
      }

      .pagination-info { color: var(--muted); font-size: 0.85rem; }
      .pagination-controls { display: flex; gap: 8px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Daily Fitness Tracker</h1>
        </header>

      <div id="status" class="status" role="status"></div>

      <!-- 1. Authentication -->
      <section class="card">
        <h2>Authentication</h2>
        <form id="authForm" autocomplete="on" onsubmit="return false">
          <input
            type="text"
            name="username"
            autocomplete="username"
            value="daily-fitness-tracker"
            tabindex="-1"
            aria-hidden="true"
            class="sr-only"
          />
          <label for="apiToken">API token</label>
          <input
            id="apiToken"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="Matches API_TOKEN in .env"
          />
          <p class="hint">Saved in this browser for 30 days. Works with password managers like Bitwarden.</p>
          <div class="actions">
            <button type="button" class="btn-secondary" id="refreshBtn">Refresh dashboard</button>
            <button type="button" class="btn-ghost" id="clearTokenBtn">Clear saved token</button>
          </div>
        </form>
      </section>

      <!-- 2. Log your day -->
      <section class="card">
        <h2>Log your day</h2>
        <p class="hint">
          <code>net_diff</code> must equal <code>intake_kcal − burn_kcal</code>.
        </p>
        <label for="jsonInput">Daily log JSON</label>
        <textarea id="jsonInput" class="json-input" spellcheck="false"></textarea>
        <div class="actions">
          <button type="button" class="btn-primary" id="saveLogBtn">Save daily log</button>
          <button type="button" class="btn-ghost" id="todayBtn">Fill today</button>
          <button type="button" class="btn-ghost" id="clearJsonBtn">Clear</button>
        </div>
      </section>

      <!-- 3. Weekly overview -->
      <section class="card">
        <h2>Weekly overview</h2>
        <canvas id="weeklyChart" height="120"></canvas>
        <p id="weeklyStats">—</p>
      </section>

      <!-- 4. Latest week -->
      <section class="card">
        <div class="progress-header">
          <h2 style="margin: 0">Latest week</h2>
          <span id="weekScoreBadge" class="score-badge">—</span>
        </div>
        <p id="weekRangeLabel" class="range-label">—</p>
        <div id="streakStats"></div>
        <div id="weekComparison" class="comparison-banner"></div>
        <div id="weekProgressPanel"></div>
        <div id="weekProgressMessages"></div>
      </section>

      <!-- 5. Latest month -->
      <section class="card">
        <div class="progress-header">
          <h2 style="margin: 0">Latest month</h2>
          <span id="monthScoreBadge" class="score-badge">—</span>
        </div>
        <p id="monthRangeLabel" class="range-label">—</p>
        <div id="monthComparison" class="comparison-banner"></div>
        <div id="monthProgressPanel"></div>
        <div id="monthProgressMessages"></div>
      </section>

      <!-- 6. History -->
      <section class="card">
        <h2>History</h2>
        <div id="tableWrap" class="table-wrap">
          <p class="empty">Load the dashboard to see history.</p>
        </div>
        <div id="pagination" class="pagination" hidden>
          <span id="paginationInfo" class="pagination-info"></span>
          <div class="pagination-controls">
            <button type="button" class="btn-secondary" id="prevPageBtn">Previous</button>
            <button type="button" class="btn-secondary" id="nextPageBtn">Next</button>
          </div>
        </div>
      </section>

      <!-- 7. Goals -->
      <section class="card">
        <h2>Your goals</h2>
        <form id="goalsForm">
          <div class="field-row">
            <div>
              <label for="steps_target">Steps target</label>
              <input id="steps_target" name="steps_target" type="number" min="1" required />
            </div>
            <div>
              <label for="protein_g_target">Protein target (g)</label>
              <input id="protein_g_target" name="protein_g_target" type="number" min="1" required />
            </div>
          </div>
          <div class="field-row">
            <div>
              <label for="intake_kcal_max">Max intake (kcal)</label>
              <input id="intake_kcal_max" name="intake_kcal_max" type="number" min="1" required />
            </div>
            <div>
              <label for="net_diff_target">Net calorie target (kcal)</label>
              <input id="net_diff_target" name="net_diff_target" type="number" required />
            </div>
          </div>
          <div class="actions">
            <button type="submit" class="btn-primary">Save goals</button>
          </div>
        </form>
      </section>
    </div>

    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>

    <script src="/app.js"></script>
  </body>
</html>
