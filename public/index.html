<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily Fitness Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --bg: #0f1419;
        --surface: #1a2332;
        --surface-2: #243044;
        --text: #e8edf4;
        --muted: #8b9cb3;
        --accent: #3dd68c;
        --accent-dim: #2a9d63;
        --danger: #f07178;
        --warning: #e6b450;
        --border: #2e3d52;
        --radius: 10px;
      }

      * { box-sizing: border-box; }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
        line-height: 1.5;
      }

      .wrap {
        max-width: 1000px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      header { margin-bottom: 24px; }
      h1 { margin: 0 0 6px; font-size: 1.75rem; }
      .subtitle { color: var(--muted); margin: 0; }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      @media (max-width: 720px) {
        .grid-2 { grid-template-columns: 1fr; }
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 20px;
      }

      .card h2 {
        margin: 0 0 14px;
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      label {
        display: block;
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input, textarea, button {
        font: inherit;
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      input, textarea {
        width: 100%;
        padding: 10px 12px;
        background: var(--surface-2);
        color: var(--text);
        margin-bottom: 12px;
      }

      input:focus, textarea:focus {
        outline: 2px solid var(--accent-dim);
        outline-offset: 1px;
      }

      textarea { min-height: 80px; resize: vertical; }

      .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      @media (max-width: 520px) {
        .field-row { grid-template-columns: 1fr; }
      }

      button {
        cursor: pointer;
        padding: 10px 18px;
        font-weight: 600;
        border: none;
      }

      .btn-primary { background: var(--accent); color: #0a120e; }
      .btn-secondary {
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }

      .status {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.9rem;
        margin-bottom: 16px;
        display: none;
      }

      .status.visible { display: block; }
      .status.success { background: rgba(61, 214, 140, 0.12); border: 1px solid var(--accent-dim); color: var(--accent); }
      .status.error { background: rgba(240, 113, 120, 0.12); border: 1px solid #c4555c; color: var(--danger); }
      .status.info { background: rgba(139, 156, 179, 0.1); border: 1px solid var(--border); color: var(--muted); }

      .progress-header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .score-badge {
        background: var(--surface-2);
        border: 1px solid var(--border);
        padding: 8px 14px;
        border-radius: 999px;
        font-weight: 700;
        font-size: 0.9rem;
      }

      .score-badge.complete {
        background: rgba(61, 214, 140, 0.15);
        border-color: var(--accent-dim);
        color: var(--accent);
      }

      #streakStats {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 14px;
      }

      .metric { margin-bottom: 14px; }
      .metric-head {
        display: flex;
        justify-content: space-between;
        font-size: 0.9rem;
        margin-bottom: 6px;
      }

      .met-text { color: var(--accent); font-weight: 600; }

      .bar {
        height: 8px;
        background: var(--surface-2);
        border-radius: 999px;
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        background: var(--warning);
        border-radius: 999px;
        transition: width 0.3s ease;
      }

      .bar-fill.met { background: var(--accent); }

      .message {
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 0.9rem;
      }

      .message.success { background: rgba(61, 214, 140, 0.1); color: var(--accent); }
      .message.info { background: rgba(139, 156, 179, 0.08); color: var(--muted); }

      #weeklyStats {
        color: var(--muted);
        font-size: 0.85rem;
        margin-top: 12px;
      }

      table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
      th { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; }
      .net-positive { color: var(--warning); }
      .net-negative { color: var(--accent); }
      .empty { color: var(--muted); text-align: center; padding: 24px; }
      .readonly { opacity: 0.7; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Daily Fitness Tracker</h1>
        <p class="subtitle">Log your day, hit your goals, and track weekly progress.</p>
      </header>

      <div id="status" class="status" role="status"></div>

      <section class="card">
        <h2>Authentication</h2>
        <label for="apiToken">API token</label>
        <input id="apiToken" type="password" placeholder="Matches API_TOKEN in .env" autocomplete="off" />
        <div class="actions">
          <button type="button" class="btn-secondary" id="refreshBtn">Refresh dashboard</button>
          <button type="button" class="btn-secondary" id="todayBtn">Jump to today</button>
        </div>
      </section>

      <section class="card">
        <div class="progress-header">
          <h2 style="margin: 0">Today&apos;s progress</h2>
          <span id="scoreBadge" class="score-badge">—</span>
        </div>
        <label for="progressDate">View date</label>
        <input id="progressDate" type="date" />
        <div id="streakStats"></div>
        <div id="progressPanel"></div>
        <div id="progressMessages"></div>
      </section>

      <section class="card">
        <h2>Your goals</h2>
        <form id="goalsForm">
          <div class="field-row">
            <div>
              <label for="steps_target">Steps target</label>
              <input id="steps_target" name="steps_target" type="number" min="1" required />
            </div>
            <div>
              <label for="protein_g_target">Protein target (g)</label>
              <input id="protein_g_target" name="protein_g_target" type="number" min="1" required />
            </div>
          </div>
          <div class="field-row">
            <div>
              <label for="intake_kcal_max">Max intake (kcal)</label>
              <input id="intake_kcal_max" name="intake_kcal_max" type="number" min="1" required />
            </div>
            <div>
              <label for="net_diff_target">Net calorie target (kcal)</label>
              <input id="net_diff_target" name="net_diff_target" type="number" required />
            </div>
          </div>
          <label for="water_ml_target">Water target (ml)</label>
          <input id="water_ml_target" name="water_ml_target" type="number" min="1" required />
          <div class="actions">
            <button type="submit" class="btn-primary">Save goals</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Log your day</h2>
        <form id="logForm">
          <label for="date">Date</label>
          <input id="date" name="date" type="date" required />

          <label for="diet_summary">What did you eat?</label>
          <textarea id="diet_summary" name="diet_summary" required placeholder="e.g. poha, sandwich, eggs"></textarea>

          <div class="field-row">
            <div>
              <label for="intake_kcal">Intake (kcal)</label>
              <input id="intake_kcal" name="intake_kcal" type="number" min="0" required />
            </div>
            <div>
              <label for="burn_kcal">Burn (kcal)</label>
              <input id="burn_kcal" name="burn_kcal" type="number" min="0" required />
            </div>
          </div>

          <div class="field-row">
            <div>
              <label for="protein_g">Protein (g)</label>
              <input id="protein_g" name="protein_g" type="number" min="0" required />
            </div>
            <div>
              <label for="steps">Steps</label>
              <input id="steps" name="steps" type="number" min="0" required />
            </div>
          </div>

          <div class="field-row">
            <div>
              <label for="water_ml">Water (ml)</label>
              <input id="water_ml" name="water_ml" type="number" min="0" value="0" />
            </div>
            <div>
              <label for="net_diff">Net diff (auto)</label>
              <input id="net_diff" name="net_diff" type="number" readonly class="readonly" />
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="btn-primary">Save daily log</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Weekly overview</h2>
        <canvas id="weeklyChart" height="120"></canvas>
        <p id="weeklyStats">—</p>
      </section>

      <section class="card">
        <h2>History</h2>
        <div id="tableWrap" class="table-wrap">
          <p class="empty">Load the dashboard to see history.</p>
        </div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
