<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily Fitness Tracker</title>
    <style>
      :root {
        --bg: #0f1419;
        --surface: #1a2332;
        --surface-2: #243044;
        --text: #e8edf4;
        --muted: #8b9cb3;
        --accent: #3dd68c;
        --accent-dim: #2a9d63;
        --danger: #f07178;
        --warning: #e6b450;
        --border: #2e3d52;
        --radius: 10px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
        line-height: 1.5;
      }

      .wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      header {
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.75rem;
        font-weight: 700;
      }

      .subtitle {
        color: var(--muted);
        margin: 0;
        font-size: 0.95rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 20px;
      }

      .card h2 {
        margin: 0 0 14px;
        font-size: 1rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      label {
        display: block;
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input,
      textarea,
      button {
        font: inherit;
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      input,
      textarea {
        width: 100%;
        padding: 10px 12px;
        background: var(--surface-2);
        color: var(--text);
      }

      input:focus,
      textarea:focus {
        outline: 2px solid var(--accent-dim);
        outline-offset: 1px;
      }

      textarea {
        min-height: 200px;
        font-family: "Cascadia Code", "Consolas", monospace;
        font-size: 13px;
        resize: vertical;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        cursor: pointer;
        padding: 10px 18px;
        font-weight: 600;
        border: none;
        transition: opacity 0.15s;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--accent);
        color: #0a120e;
      }

      .btn-secondary {
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
      }

      button:not(:disabled):hover {
        opacity: 0.9;
      }

      .status {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.9rem;
        margin-bottom: 16px;
        display: none;
      }

      .status.visible {
        display: block;
      }

      .status.success {
        background: rgba(61, 214, 140, 0.12);
        border: 1px solid var(--accent-dim);
        color: var(--accent);
      }

      .status.error {
        background: rgba(240, 113, 120, 0.12);
        border: 1px solid #c4555c;
        color: var(--danger);
      }

      .status.info {
        background: rgba(139, 156, 179, 0.1);
        border: 1px solid var(--border);
        color: var(--muted);
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }

      th,
      td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
      }

      th {
        color: var(--muted);
        font-weight: 600;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      tr:last-child td {
        border-bottom: none;
      }

      .net-positive {
        color: var(--warning);
      }

      .net-negative {
        color: var(--accent);
      }

      .empty {
        color: var(--muted);
        text-align: center;
        padding: 24px;
      }

      pre.raw {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        overflow-x: auto;
        font-size: 12px;
        margin: 0;
        display: none;
      }

      pre.raw.visible {
        display: block;
      }

      .hint {
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: 8px;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <header>
        <h1>Daily Fitness Tracker</h1>
        <p class="subtitle">Log diet, steps, and calories — synced to Turso.</p>
      </header>

      <div id="status" class="status" role="status"></div>

      <section class="card">
        <h2>Authentication</h2>
        <label for="apiToken">API token</label>
        <input id="apiToken" type="password" placeholder="Matches API_TOKEN in .env" autocomplete="off" />
      </section>

      <section class="card">
        <h2>Save daily log</h2>
        <label for="jsonInput">JSON payload</label>
        <textarea id="jsonInput"></textarea>
        <p class="hint">net_diff must equal intake_kcal − burn_kcal. Use “Fill today” to set the date.</p>
        <div class="actions">
          <button type="button" class="btn-primary" id="saveBtn">Save daily log</button>
          <button type="button" class="btn-ghost" id="todayBtn">Fill today</button>
          <button type="button" class="btn-ghost" id="calcNetBtn">Recalc net_diff</button>
        </div>
      </section>

      <section class="card">
        <h2>History</h2>
        <div class="actions">
          <button type="button" class="btn-secondary" id="loadBtn">Load logs</button>
          <button type="button" class="btn-ghost" id="toggleRawBtn">Show raw JSON</button>
        </div>
        <div id="tableWrap" class="table-wrap" style="margin-top: 16px">
          <p class="empty">No logs loaded yet.</p>
        </div>
        <pre id="rawOutput" class="raw"></pre>
      </section>
    </div>

    <script>
      const tokenInput = document.getElementById("apiToken");
      const jsonInput = document.getElementById("jsonInput");
      const statusEl = document.getElementById("status");
      const tableWrap = document.getElementById("tableWrap");
      const rawOutput = document.getElementById("rawOutput");
      const saveBtn = document.getElementById("saveBtn");
      const loadBtn = document.getElementById("loadBtn");

      const defaultPayload = {
        date: "",
        diet_summary: "",
        intake_kcal: 0,
        protein_g: 0,
        steps: 0,
        burn_kcal: 0,
        net_diff: 0,
      };

      function todayISO() {
        return new Date().toISOString().slice(0, 10);
      }

      function setStatus(message, type = "info") {
        statusEl.textContent = message;
        statusEl.className = `status visible ${type}`;
      }

      function clearStatus() {
        statusEl.className = "status";
        statusEl.textContent = "";
      }

      function setLoading(loading) {
        saveBtn.disabled = loading;
        loadBtn.disabled = loading;
      }

      function getHeaders() {
        return {
          "Content-Type": "application/json",
          "x-api-token": tokenInput.value,
        };
      }

      function fillToday() {
        const payload = JSON.parse(jsonInput.value || "{}");
        payload.date = todayISO();
        jsonInput.value = JSON.stringify(payload, null, 2);
      }

      function recalcNetDiff() {
        const payload = JSON.parse(jsonInput.value);
        payload.net_diff = Number(payload.intake_kcal) - Number(payload.burn_kcal);
        jsonInput.value = JSON.stringify(payload, null, 2);
        setStatus(`net_diff set to ${payload.net_diff}`, "info");
      }

      function renderTable(rows) {
        if (!rows.length) {
          tableWrap.innerHTML = '<p class="empty">No logs found.</p>';
          return;
        }

        const headers = [
          "date",
          "diet_summary",
          "intake_kcal",
          "protein_g",
          "steps",
          "burn_kcal",
          "net_diff",
        ];

        const thead = headers.map((h) => `<th>${h.replace("_", " ")}</th>`).join("");
        const tbody = rows
          .map((row) => {
            const net = Number(row.net_diff);
            const netClass = net >= 0 ? "net-positive" : "net-negative";
            return `<tr>
              <td>${row.date}</td>
              <td>${row.diet_summary}</td>
              <td>${row.intake_kcal}</td>
              <td>${row.protein_g}g</td>
              <td>${row.steps?.toLocaleString?.() ?? row.steps}</td>
              <td>${row.burn_kcal}</td>
              <td class="${netClass}">${net > 0 ? "+" : ""}${net}</td>
            </tr>`;
          })
          .join("");

        tableWrap.innerHTML = `<table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
      }

      async function submitLog() {
        clearStatus();
        setLoading(true);

        try {
          const payload = JSON.parse(jsonInput.value);

          const res = await fetch("/api/daily-log", {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify(payload),
          });

          const data = await res.json();

          if (!res.ok) {
            setStatus(data.message || "Request failed", "error");
            return;
          }

          setStatus(data.message || "Log saved", "success");
          await loadLogs({ quiet: true });
        } catch (err) {
          setStatus(err.message, "error");
        } finally {
          setLoading(false);
        }
      }

      async function loadLogs({ quiet = false } = {}) {
        if (!quiet) clearStatus();
        setLoading(true);

        try {
          const res = await fetch("/api/daily-log", {
            headers: { "x-api-token": tokenInput.value },
          });

          const data = await res.json();

          if (!res.ok) {
            setStatus(data.message || "Failed to load logs", "error");
            return;
          }

          rawOutput.textContent = JSON.stringify(data, null, 2);
          renderTable(data);

          if (!quiet) {
            setStatus(`Loaded ${data.length} log${data.length === 1 ? "" : "s"}`, "success");
          }
        } catch (err) {
          setStatus(err.message, "error");
        } finally {
          setLoading(false);
        }
      }

      const savedToken = localStorage.getItem("fitness_api_token");
      if (savedToken) tokenInput.value = savedToken;

      tokenInput.addEventListener("input", () => {
        localStorage.setItem("fitness_api_token", tokenInput.value);
      });

      jsonInput.value = JSON.stringify({ ...defaultPayload, date: todayISO() }, null, 2);

      document.getElementById("saveBtn").addEventListener("click", submitLog);
      document.getElementById("loadBtn").addEventListener("click", () => loadLogs());
      document.getElementById("todayBtn").addEventListener("click", fillToday);
      document.getElementById("calcNetBtn").addEventListener("click", () => {
        try {
          recalcNetDiff();
        } catch {
          setStatus("Invalid JSON in editor", "error");
        }
      });
      document.getElementById("toggleRawBtn").addEventListener("click", () => {
        rawOutput.classList.toggle("visible");
      });
    </script>
  </body>
</html>
