app = "daily-fitness-tracker"
primary_region = "bom"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    path = "/api/health"
    interval = "30s"
    timeout = "5s"

[env]
  NODE_ENV = "production"
